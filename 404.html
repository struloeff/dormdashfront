<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#FD2D00" />
<meta name="description" content="DormDash service is suspended for the summer. We'll be back when fall semester begins.">
<title>DormDash — On Break for Summer</title>
<link rel="icon" type="image/x-icon" href="/static/icon.ico">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  :root {
    --brand-primary: #FD2D00;
    --brand-dark: #e55d00;
    --bg-dark: #0a0e1a;
    --surface: #131824;
    --text-primary: #ffffff;
    --text-secondary: #a0aec0;
    --text-muted: #6b7280;
    --border: rgba(255, 255, 255, 0.08);
    --spacing: clamp(20px, 5vw, 40px);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    line-height: 1.6;
    overflow-x: hidden;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* Layered ambient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 50% -10%, rgba(253, 45, 0, 0.18), transparent 60%),
      radial-gradient(ellipse 50% 50% at 85% 60%, rgba(59, 130, 246, 0.08), transparent 60%),
      radial-gradient(ellipse 60% 40% at 10% 90%, rgba(139, 92, 246, 0.06), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Fine grid texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 56px 56px;
    mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, #000 30%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, #000 30%, transparent 75%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 var(--spacing);
    position: relative;
    z-index: 1;
    width: 100%;
  }

  /* Header */
  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    background: rgba(10, 14, 26, 0.45);
    backdrop-filter: blur(16px) saturate(180%);
    -webkit-backdrop-filter: blur(16px) saturate(180%);
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  }

  nav {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 22px var(--spacing);
    min-height: 80px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 800;
    font-size: 24px;
    letter-spacing: -0.02em;
  }

  .logo-icon {
    width: 46px;
    height: 46px;
    background: url('/static/dormdash.png') center/contain no-repeat;
  }

  /* Main */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 150px var(--spacing) 90px;
    position: relative;
    z-index: 1;
  }

  .notice {
    max-width: 680px;
    text-align: center;
  }

  .notice > * {
    opacity: 0;
    transform: translateY(20px);
    animation: rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  .notice > *:nth-child(1) { animation-delay: 0.05s; }
  .notice > *:nth-child(2) { animation-delay: 0.15s; }
  .notice > *:nth-child(3) { animation-delay: 0.25s; }
  .notice > *:nth-child(4) { animation-delay: 0.35s; }
  .notice > *:nth-child(5) { animation-delay: 0.45s; }

  @keyframes rise {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Glyph mark */
  .glyph {
    width: 96px;
    height: 96px;
    margin: 0 auto 32px;
    border-radius: 26px;
    display: grid;
    place-items: center;
    background: linear-gradient(145deg, rgba(253,45,0,0.14), rgba(253,45,0,0.04));
    border: 1px solid rgba(253, 45, 0, 0.25);
    box-shadow: 0 16px 50px rgba(253, 45, 0, 0.18), inset 0 1px 0 rgba(255,255,255,0.08);
    position: relative;
  }

  .glyph svg {
    width: 46px;
    height: 46px;
    stroke: var(--brand-primary);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .glyph::after {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 26px;
    background: radial-gradient(circle at 50% 0%, rgba(253,45,0,0.25), transparent 70%);
    opacity: 0.6;
    z-index: -1;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    padding: 8px 18px;
    border-radius: 999px;
    background: rgba(253, 45, 0, 0.1);
    border: 1px solid rgba(253, 45, 0, 0.3);
    color: var(--brand-primary);
    font-size: 12.5px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 26px;
  }

  .badge .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--brand-primary);
    box-shadow: 0 0 0 0 rgba(253, 45, 0, 0.5);
    animation: pulse 2.2s infinite;
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(253, 45, 0, 0.5); }
    70% { box-shadow: 0 0 0 12px rgba(253, 45, 0, 0); }
    100% { box-shadow: 0 0 0 0 rgba(253, 45, 0, 0); }
  }

  .notice h1 {
    font-size: clamp(34px, 6.2vw, 58px);
    font-weight: 800;
    line-height: 1.08;
    letter-spacing: -0.035em;
    margin-bottom: 22px;
  }

  .notice h1 .accent {
    background: linear-gradient(135deg, var(--brand-primary), var(--brand-dark));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .notice .lead {
    font-size: clamp(16px, 2.4vw, 19px);
    color: var(--text-secondary);
    max-width: 540px;
    margin: 0 auto;
  }

  /* Divider + return-date chip */
  .meta {
    margin-top: 40px;
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 14px 22px;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border);
    backdrop-filter: blur(8px);
  }

  .meta .meta-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: grid;
    place-items: center;
    background: rgba(253, 45, 0, 0.12);
    flex-shrink: 0;
  }
  .meta .meta-icon svg {
    width: 20px; height: 20px;
    stroke: var(--brand-primary);
    fill: none; stroke-width: 2;
    stroke-linecap: round; stroke-linejoin: round;
  }

  .meta .meta-text {
    text-align: left;
    line-height: 1.3;
  }
  .meta .meta-text .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    font-weight: 600;
  }
  .meta .meta-text .value {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
  }

  /* Footer */
  footer {
    border-top: 1px solid var(--border);
    padding: 26px var(--spacing);
    position: relative;
    z-index: 1;
  }

  .footer-bottom {
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    text-align: center;
    color: var(--text-muted);
    font-size: 13.5px;
  }
  .footer-bottom .sep { opacity: 0.4; }

  @media (max-width: 520px) {
    main { padding-top: 130px; }
    .meta { width: 100%; }
  }

  @media (prefers-reduced-motion: reduce) {
    .notice > * { animation: none; opacity: 1; transform: none; }
    .badge .dot { animation: none; }
  }
</style>
</head>
<body>

<header>
  <nav>
    <div class="logo">
      <div class="logo-icon"></div>
      <span>DormDash</span>
    </div>
  </nav>
</header>

<main>
  <div class="notice">
    <div class="glyph" aria-hidden="true">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
    </div>
    <div class="badge"><span class="dot"></span> Service Paused</div>
    <h1>We're on break <span class="accent">for the summer.</span></h1>
    <p class="lead">DormDash food delivery and rideshare are suspended while students are away. We'll be back up and running when fall semester begins — thanks for riding with us.</p>
    <div class="meta">
      <div class="meta-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      </div>
      <div class="meta-text">
        <div class="label">Back in service</div>
        <div class="value">Fall Semester 2026</div>
      </div>
    </div>
  </div>
</main>

<footer>
  <div class="footer-bottom">
    <span>© <span id="year"></span> DormDash</span>
    <span class="sep">•</span>
    <span>Built for Waves 🌊</span>
  </div>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();
</script>

</body>
</html>
